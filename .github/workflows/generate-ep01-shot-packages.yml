name: Generate EP01 Shot Packages

on:
  workflow_dispatch:
  push:
    paths:
      - "tools/generate_ep01_production_packages.py"
      - "production/EP01/shot_blueprint.csv"
      - ".github/workflows/generate-ep01-shot-packages.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate production packages
        run: python tools/generate_ep01_production_packages.py

      - name: Verify generated output
        run: |
          test -d production/EP01/shots/SHOT001
          test -d production/EP01/shots/SHOT085
          test -f production/EP01/shot_index.csv
          count=$(find production/EP01/shots -maxdepth 1 -type d -name 'SHOT*' | wc -l)
          test "$count" -eq 85

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add production/EP01/shots production/EP01/shot_index.csv
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "feat(production): generate EP01 shot packages"
            git push
          fi
